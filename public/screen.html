<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pantalla de Espectador - Juego de Habilidades</title>
  <style>
    :root {
      --bg: #0f172a;
      --surface: #111827;
      --accent: #38bdf8;
      --text: #f8fafc;
      --gold: #fbbf24;
      --silver: #d1d5db;
      --bronze: #d97706;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    .spectator-container {
      max-width: 1400px;
      margin: 0 auto;
      width: 100%;
      padding: 20px;
      flex: 1;
      display: flex;
      flex-direction: column;
    }

    .spectator-header {
      text-align: center;
      margin-bottom: 30px;
      animation: slideDown 0.6s ease;
    }

    .spectator-header h1 {
      font-size: 3.5rem;
      margin-bottom: 10px;
      background: linear-gradient(120deg, var(--accent), #06b6d4);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .spectator-header p {
      font-size: 1.2rem;
      color: #cbd5e1;
    }

    .leaderboard-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
      gap: 20px;
      flex: 1;
    }

    .leaderboard-card {
      background: rgba(30, 41, 59, 0.95);
      border: 2px solid var(--accent);
      border-radius: 20px;
      padding: 25px;
      box-shadow: 0 20px 50px rgba(0, 0, 0, 0.4);
      transform: translateY(0);
      transition: transform 0.3s ease, box-shadow 0.3s ease;
      animation: popIn 0.6s ease;
    }

    .leaderboard-card:hover {
      transform: translateY(-5px);
      box-shadow: 0 25px 60px rgba(56, 189, 248, 0.2);
    }

    .leaderboard-card h2 {
      font-size: 1.3rem;
      margin-bottom: 15px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .leaderboard-list {
      list-style: none;
    }

    .leaderboard-item {
      display: flex;
      align-items: center;
      padding: 12px 0;
      border-bottom: 1px solid rgba(148, 163, 184, 0.1);
      font-size: 1.1rem;
      animation: slideRight 0.6s ease;
    }

    .leaderboard-item:last-child {
      border-bottom: none;
    }

    .leaderboard-item.winner {
      background: linear-gradient(90deg, rgba(251, 191, 36, 0.1), transparent);
      padding: 12px;
      border-radius: 10px;
      margin: 0 -12px;
      padding-left: 12px;
    }

    .medal {
      font-size: 1.8rem;
      width: 50px;
      display: inline-block;
    }

    .player-info {
      flex: 1;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 15px;
    }

    .player-name {
      font-weight: 600;
      font-size: 1.05rem;
    }

    .player-stats {
      display: flex;
      gap: 15px;
      font-weight: 700;
    }

    .stat-box {
      background: rgba(56, 189, 248, 0.1);
      padding: 8px 14px;
      border-radius: 8px;
      border-left: 3px solid var(--accent);
      text-align: center;
    }

    .stat-label {
      font-size: 0.8rem;
      color: #94a3b8;
      display: block;
    }

    .stat-value {
      font-size: 1.2rem;
      color: var(--accent);
    }

    .empty-state {
      grid-column: 1 / -1;
      text-align: center;
      padding: 60px 20px;
      color: #64748b;
    }

    .empty-state h3 {
      font-size: 2rem;
      margin-bottom: 10px;
    }

    .sync-indicator {
      position: fixed;
      bottom: 20px;
      right: 20px;
      background: rgba(16, 185, 129, 0.9);
      color: white;
      padding: 10px 15px;
      border-radius: 8px;
      font-size: 0.9rem;
      display: none;
      animation: pulse 1s infinite;
    }

    .sync-indicator.active {
      display: block;
    }

    @keyframes slideDown {
      from {
        opacity: 0;
        transform: translateY(-20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes slideRight {
      from {
        opacity: 0;
        transform: translateX(-20px);
      }
      to {
        opacity: 1;
        transform: translateX(0);
      }
    }

    @keyframes popIn {
      from {
        opacity: 0;
        transform: scale(0.95);
      }
      to {
        opacity: 1;
        transform: scale(1);
      }
    }

    @keyframes pulse {
      0%, 100% {
        opacity: 1;
      }
      50% {
        opacity: 0.7;
      }
    }

    @media (max-width: 768px) {
      .spectator-header h1 {
        font-size: 2rem;
      }

      .leaderboard-grid {
        grid-template-columns: 1fr;
      }

      .player-stats {
        flex-direction: column;
        gap: 5px;
      }
    }
  </style>
</head>
<body>
  <div class="spectator-container">
    <div class="spectator-header">
      <h1>🏆 LEADERBOARD EN VIVO</h1>
      <p>Sigue el ranking de tu equipo en tiempo real</p>
    </div>

    <div id="leaderboardGrid" class="leaderboard-grid"></div>
  </div>

  <div id="syncIndicator" class="sync-indicator">🔄 Sincronizando...</div>

  <!-- Firebase Compat SDKs -->
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>

  <script>
    const leaderboardGrid = document.getElementById('leaderboardGrid');
    const syncIndicator = document.getElementById('syncIndicator');

    let players = [];
    let gameState = null;
    let isMultiplayer = false;

    function renderSpectator(customPlayers) {
      const activePlayers = customPlayers || players;

      if (activePlayers.length === 0) {
        leaderboardGrid.innerHTML = `<div class="empty-state"><h3>📍 Esperando jugadores...</h3><p>Los jugadores aparecerán aquí cuando se unan al juego</p></div>`;
        return;
      }

      const sorted = [...activePlayers].sort((a, b) => b.totalPoints - a.totalPoints);
      const medals = ['🥇', '🥈', '🥉'];

      // Contenedor principal de dos columnas
      let html = `<div class="leaderboard-grid-inner" style="display: grid; grid-template-columns: ${isMultiplayer && gameState && gameState.challengeActive ? '1.2fr 1fr' : '1fr'}; gap: 24px; width: 100%;">`;

      // Columna 1: Ranking General
      html += `<div class="leaderboard-card">
        <h2>👥 Ranking General</h2>
        <ul class="leaderboard-list">`;

      sorted.slice(0, 10).forEach((player, idx) => {
        const isWinner = idx === 0;
        
        let onlineDot = '';
        if (isMultiplayer) {
          const isOnline = player.online !== false;
          onlineDot = `<span style="display:inline-block; width:8px; height:8px; border-radius:50%; background-color:${isOnline ? '#10b981' : '#64748b'}; margin-right:8px; box-shadow:${isOnline ? '0 0 6px #10b981' : 'none'};"></span>`;
        }

        html += `
          <li class="leaderboard-item ${isWinner ? 'winner' : ''}">
            <span class="medal">${medals[idx] || '·'}</span>
            <div class="player-info">
              <span class="player-name">${onlineDot}#${idx + 1} ${player.name}</span>
              <div class="player-stats">
                <div class="stat-box">
                  <span class="stat-label">Puntos</span>
                  <span class="stat-value">${player.totalPoints}</span>
                </div>
              </div>
            </div>
          </li>`;
      });

      html += `</ul></div>`;

      // Columna 2: Estado de la Ronda o Estadísticas
      if (isMultiplayer && gameState && gameState.challengeActive) {
        const cat = gameState.currentCategory || '';
        const icons = {
          mecanografia: '⌨', excel: '📊', formulas: '∑', peliculas: '🎬',
          futbol: '⚽', codigo: '💻', agilidad: '🏃', python: '🐍',
          animales: '🦁', habilidades: '🎯', javascript: '✨', liderazgo: '👑',
          negocios: '💼', musica: '🎵', cultura: '🎭'
        };
        const catIcon = icons[cat] || '❓';
        const subs = gameState.submissions || {};

        html += `<div class="leaderboard-card" style="border-color: #fbbf24; box-shadow: 0 20px 50px rgba(251, 191, 36, 0.15);">
          <h2>⚡ Ronda en Vivo: ${catIcon} ${cat.toUpperCase()}</h2>
          <ul class="leaderboard-list" style="margin-top: 15px;">`;

        activePlayers.forEach(p => {
          const sub = subs[p.name];
          if (sub) {
            html += `
              <li class="leaderboard-item" style="background: rgba(16, 185, 129, 0.08); border-radius: 8px; padding: 12px; margin-bottom: 8px; border-bottom: none; display: flex; justify-content: space-between;">
                <span class="player-name">✅ ${p.name}</span>
                <div class="player-stats" style="gap: 8px;">
                  <div class="stat-box" style="border-left-color: #10b981; background: rgba(16, 185, 129, 0.05); padding: 4px 8px; border-radius: 6px;">
                    <span class="stat-value" style="color: #10b981; font-size: 1rem;">${sub.score}/${sub.total}</span>
                  </div>
                  <div class="stat-box" style="border-left-color: #fbbf24; background: rgba(251, 191, 36, 0.05); padding: 4px 8px; border-radius: 6px;">
                    <span class="stat-value" style="color: #fbbf24; font-size: 1rem;">${sub.timeTakenSeconds}s</span>
                  </div>
                </div>
              </li>`;
          } else {
            html += `
              <li class="leaderboard-item" style="background: rgba(148, 163, 184, 0.04); border-radius: 8px; padding: 12px; margin-bottom: 8px; opacity: 0.7; border-bottom: none; display: flex; justify-content: space-between;">
                <span class="player-name">⌛ ${p.name}</span>
                <span style="color: #94a3b8; font-size: 0.9rem; font-style: italic;">Respondiendo...</span>
              </li>`;
          }
        });
        html += `</ul></div>`;
      } else {
        if (sorted.length > 0) {
          const topScore = sorted[0];
          const topAnswers = [...activePlayers].reduce((a, b) => a.totalAnswers > b.totalAnswers ? a : b);
          const avgScore = Math.round(activePlayers.reduce((a, b) => a + b.totalPoints, 0) / activePlayers.length);

          html += `<div class="leaderboard-card">
            <h2>📊 Estadísticas</h2>
            <ul class="leaderboard-list">
              <li class="leaderboard-item">
                <span style="font-size: 2rem; width: 50px;">🏆</span>
                <div class="player-info">
                  <span class="player-name">Líder de Puntos</span>
                  <span class="stat-value">${topScore.name}</span>
                </div>
              </li>
              <li class="leaderboard-item">
                <span style="font-size: 2rem; width: 50px;">💬</span>
                <div class="player-info">
                  <span class="player-name">Más Participación</span>
                  <span class="stat-value">${topAnswers.name}</span>
                </div>
              </li>
              <li class="leaderboard-item">
                <span style="font-size: 2rem; width: 50px;">📈</span>
                <div class="player-info">
                  <span class="player-name">Promedio del Equipo</span>
                  <span class="stat-value">${avgScore}p</span>
                </div>
              </li>
            </ul>
          </div>`;
        }
      }

      html += `</div>`;
      leaderboardGrid.innerHTML = html;
    }

    const defaultFirebaseConfig = {
      apiKey: atob("QUl6YVN5RDBhbmkyQnlUdkxib0NYVm1HY2RFYk9BZzdxdXJyZGFR"),
      authDomain: "retro-e9a27.firebaseapp.com",
      projectId: "retro-e9a27",
      databaseURL: "https://retro-e9a27-default-rtdb.firebaseio.com",
      storageBucket: "retro-e9a27.firebasestorage.app",
      messagingSenderId: "51894964862",
      appId: "1:51894964862:web:43d30b9a1e5db4619e3e2f"
    };

    function initSync() {
      const params = new URLSearchParams(window.location.search);
      const room = params.get('room');
      const configB64 = params.get('config');

      if (room) {
        try {
          let firebaseConfig = defaultFirebaseConfig;
          if (configB64) {
            firebaseConfig = JSON.parse(atob(configB64));
          }
          
          if (!firebaseConfig.apiKey || !firebaseConfig.databaseURL) {
            throw new Error("Claves incorrectas");
          }

          firebase.initializeApp(firebaseConfig);
          const database = firebase.database();
          isMultiplayer = true;

          showSyncIndicator();

          // Escuchar cambios de jugadores
          database.ref(`rooms/${room}/players`).on('value', (snapshot) => {
            showSyncIndicator();
            const data = snapshot.val();
            players = [];
            if (data) {
              Object.keys(data).forEach(key => {
                players.push({
                  name: key,
                  totalPoints: data[key].totalPoints || 0,
                  totalAnswers: data[key].totalAnswers || 0,
                  online: data[key].online !== false
                });
              });
            }
            renderSpectator();
          });

          // Escuchar cambios de estado de ronda en vivo
          database.ref(`rooms/${room}/gameState`).on('value', (snapshot) => {
            showSyncIndicator();
            gameState = snapshot.val();
            renderSpectator();
          });

        } catch (e) {
          console.error("Error al conectar espectador a Firebase, usando LocalStorage fallback:", e);
          setupLocalStoragePolling();
        }
      } else {
        setupLocalStoragePolling();
      }
    }

    function showSyncIndicator() {
      syncIndicator.classList.add('active');
      setTimeout(() => {
        syncIndicator.classList.remove('active');
      }, 600);
    }

    function setupLocalStoragePolling() {
      isMultiplayer = false;
      
      function syncAndRefresh() {
        syncIndicator.classList.add('active');
        setTimeout(() => {
          const gameData = localStorage.getItem('gameData');
          players = gameData ? JSON.parse(gameData) : [];
          renderSpectator();
          syncIndicator.classList.remove('active');
        }, 500);
      }

      setInterval(syncAndRefresh, 2000);
      
      const gameData = localStorage.getItem('gameData');
      players = gameData ? JSON.parse(gameData) : [];
      renderSpectator();
    }

    initSync();
  </script>
</body>
</html>
